name: lexlink
description: E2E encrypted peer-to-peer messaging for attorney-client privilege communications.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  sentry_flutter: ^8.14.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  convert: ^3.1.1

  # Storage and state management
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  flutter_secure_storage: ^8.0.0
  sqflite: ^2.2.0
  path: ^1.8.0

  # Encryption and security
  cryptography: ^2.5.0
  crypto: ^3.0.3
  uuid: ^3.0.7
  permission_handler: ^10.4.3

  # UI components
  google_fonts: ^4.0.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.2.0

  # WebRTC communication
  flutter_webrtc: ^0.13.1+hotfix.1
  web_socket_channel: ^2.4.0

  # Utilities
  logger: ^1.3.0
  path_provider: ^2.0.15
  intl: ^0.20.2
  ulid: ^2.0.0
  connectivity_plus: ^4.0.2

dev_dependencies:
  sentry_dart_plugin: ^2.4.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  webrtc_interface: ^1.2.2

flutter:
  uses-material-design: true

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: deepanjay
